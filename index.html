<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FinFlow"/>
<meta name="theme-color" content="#080C18"/>

<title>FinFlow — Firebase Cloud</title>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, updateDoc, deleteDoc, query, where, orderBy, serverTimestamp, writeBatch } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ════════════════════════════════════════════════════════
// 🔥 FIREBASE CONFIG
// ════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyAwvsmRNs2qYvnzPwuBtvJqVXzjtc7UeOc",
  authDomain:        "finflow-7ba41.firebaseapp.com",
  databaseURL:       "https://finflow-7ba41-default-rtdb.firebaseio.com",
  projectId:         "finflow-7ba41",
  storageBucket:     "finflow-7ba41.firebasestorage.app",
  messagingSenderId: "587164686830",
  appId:             "1:587164686830:web:c5447ff2de75467da256ff",
  measurementId:     "G-H1E39HMN5G"
};

// Detect unconfigured
const CONFIGURED = !firebaseConfig.apiKey.includes('YOUR_');

let app, auth, db;
if (CONFIGURED) {
  app  = initializeApp(firebaseConfig);
  auth = getAuth(app);
  db   = getFirestore(app);
}

// ════════════════════════════════════════════════════════
// EXPOSE to global scope (used by rest of app)
// ════════════════════════════════════════════════════════
window.FB = {
  CONFIGURED, auth, db,
  createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged, updateProfile, sendPasswordResetEmail,
  GoogleAuthProvider, signInWithPopup,
  doc, setDoc, getDoc, collection, addDoc, getDocs, updateDoc,
  deleteDoc, query, where, orderBy, serverTimestamp, writeBatch,
};

// Trigger app boot after Firebase is ready
window.dispatchEvent(new Event('fb-ready'));
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}

:root{
  --bg:#080C18;--s1:#0F1728;--s2:#162035;--s3:#1D2A45;--s4:#243354;
  --a1:#5EEAD4;--a2:#A78BFA;--a3:#F59E0B;--a4:#F87171;
  --g:#10B981;--r:#EF4444;--b:#6366F1;
  --t1:#F8FAFC;--t2:#94A3B8;--t3:#64748B;
  --bd:#1E2D45;--bd2:#2D4060;
  --rr:14px;--r2:10px;--r3:24px;
  /* Safe area insets — critical for iPhone notch + home bar */
  --sat: env(safe-area-inset-top, 0px);
  --sar: env(safe-area-inset-right, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  /* Nav height = icon area + bottom safe area */
  --nav-h: calc(60px + var(--sab));
  /* Page padding bottom = nav height + extra breathing room */
  --page-pb: calc(var(--nav-h) + 16px);
}

html {
  /* Use dynamic viewport height — fixes iOS Safari bottom bar collapsing 100vh */
  height: 100%;
  height: -webkit-fill-available;
}

body {
  height: 100%;
  height: -webkit-fill-available;
  background: var(--bg);
  color: var(--t1);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  /* Prevent rubber-band scroll on iOS */
  overscroll-behavior: none;
}

#app {
  display: flex;
  flex-direction: column;
  /* Use dvh with fallback — this is what actually fills iPhone Safari correctly */
  height: 100vh;
  height: 100dvh;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  background: var(--bg);
  /* Add left/right safe area padding for notch phones in landscape */
  padding-left: var(--sal);
  padding-right: var(--sar);
}

/* SCROLLABLE PAGE AREA */
.page {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  /* Pad bottom so content never hides under the nav bar */
  padding-bottom: var(--page-pb);
  scrollbar-width: none;
  /* Smooth momentum scrolling on iOS */
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}
.page::-webkit-scrollbar { display: none; }

/* ── BOTTOM NAV ─────────────────────────────────────────── */
.bnav {
  /* Fixed to bottom of #app, not viewport */
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  /* Height = icon row + iPhone home bar */
  height: var(--nav-h);
  background: var(--s1);
  border-top: 1px solid var(--bd2);
  display: flex;
  align-items: flex-start; /* icons sit at top, home bar below */
  z-index: 100;
  /* Extend background into home bar area */
  padding-bottom: var(--sab);
}
.ni {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  /* 60px tap area — large enough for thumbs */
  height: 60px;
  padding: 8px 4px;
  transition: .2s;
  /* Remove any default button styles */
  -webkit-appearance: none;
  user-select: none;
}
.ni svg { width: 22px; height: 22px; stroke: var(--t3); transition: .2s; }
.ni span { font-size: 10px; font-family: 'Syne', sans-serif; font-weight: 600; color: var(--t3); transition: .2s; }
.ni.on svg { stroke: var(--a1); }
.ni.on span { color: var(--a1); }

/* ── FAB ──────────────────────────────────────────────────── */
.fab {
  position: absolute;
  /* Sit just above the nav bar */
  bottom: calc(var(--nav-h) + 12px);
  right: 16px;
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--a1), var(--a2));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 200;
  transition: .3s;
  box-shadow: 0 4px 24px rgba(94,234,212,.4);
  /* Large enough tap target */
  touch-action: manipulation;
}
.fab svg { width: 24px; height: 24px; stroke: #000; transition: .3s; }
.fab.open { transform: rotate(45deg); }

/* FAB MENU */
.fmenu {
  position: absolute;
  bottom: calc(var(--nav-h) + 80px);
  right: 14px;
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
  opacity: 0;
  transform: translateY(10px);
  pointer-events: none;
  transition: .22s;
}
.fmenu.open { opacity: 1; transform: none; pointer-events: all; }
.fb {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--s2);
  border: 1px solid var(--bd2);
  border-radius: var(--r3);
  padding: 11px 16px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,.6);
  transition: .12s;
  touch-action: manipulation;
}
.fb:active { transform: scale(.97); }
.fd { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

/* ── CARDS ────────────────────────────────────────────────── */
.card { background: var(--s1); border: 1px solid var(--bd); border-radius: var(--rr); padding: 16px; }
.card2 { background: var(--s2); border: 1px solid var(--bd); border-radius: var(--r2); padding: 14px; }

/* ── PAGE STRUCTURE ───────────────────────────────────────── */
.ph { padding: 18px 16px 10px; display: flex; justify-content: space-between; align-items: center; }
.ptitle { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
.sec { padding: 0 16px; margin-bottom: 14px; }
.sh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.stitle { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
.slink { font-size: 12px; color: var(--a1); cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 600; }

/* Horizontal scroll chips */
.chips { display: flex; gap: 8px; overflow-x: auto; padding: 0 16px 10px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip { padding: 7px 15px; border-radius: var(--r3); border: 1px solid var(--bd2); font-size: 12px; font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer; white-space: nowrap; transition: .15s; color: var(--t2); touch-action: manipulation; }
.chip.on { background: var(--a1); color: #000; border-color: var(--a1); }

/* ── BADGES ───────────────────────────────────────────────── */
.badge { padding: 3px 9px; border-radius: var(--r3); font-size: 11px; font-weight: 600; font-family: 'Syne', sans-serif; }
.bg { background: rgba(16,185,129,.15); color: #34D399; }
.br { background: rgba(239,68,68,.15); color: #F87171; }
.by { background: rgba(245,158,11,.15); color: #FCD34D; }
.bt { background: rgba(94,234,212,.15); color: var(--a1); }
.bpu { background: rgba(167,139,250,.15); color: var(--a2); }

/* ── PROGRESS ─────────────────────────────────────────────── */
.pw { background: var(--s4); border-radius: 6px; overflow: hidden; }
.pb { border-radius: 6px; transition: .4s; }

/* ── FORMS ────────────────────────────────────────────────── */
.fl { font-size: 11px; color: var(--t2); margin-bottom: 5px; display: block; font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: .3px; text-transform: uppercase; }
.fi, .fs {
  width: 100%;
  background: var(--s3);
  border: 1px solid var(--bd2);
  border-radius: var(--r2);
  /* Tall enough for 44px tap target */
  padding: 12px 13px;
  color: var(--t1);
  font-size: 16px; /* 16px prevents iOS auto-zoom on focus */
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: .15s;
  -webkit-appearance: none;
  appearance: none;
}
.fi:focus, .fs:focus { border-color: var(--a1); background: var(--s4); }
.fs option { background: var(--s2); }
.btn {
  padding: 14px;
  border-radius: var(--r2);
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  width: 100%;
  transition: .15s;
  /* 44px minimum tap height */
  min-height: 44px;
  touch-action: manipulation;
}
.btp { background: linear-gradient(135deg, var(--a1), var(--a2)); color: #000; }
.bts { background: var(--s3); color: var(--t1); border: 1px solid var(--bd2); }
.btr { background: rgba(239,68,68,.12); color: var(--r); border: 1px solid rgba(239,68,68,.3); }
.btn:active { transform: scale(.98); }
.fg { margin-bottom: 12px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── MODAL ────────────────────────────────────────────────── */
.mo {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.82);
  z-index: 500;
  display: flex;
  align-items: flex-end;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.mo.hidden { display: none; }
.mc {
  background: var(--s1);
  border-radius: 26px 26px 0 0;
  /* Pad bottom for iPhone home bar so last button is never hidden */
  padding: 18px 16px calc(28px + var(--sab));
  width: 100%;
  /* Limit height so modal is scrollable on small phones */
  max-height: 90dvh;
  max-height: 90vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.mc::-webkit-scrollbar { display: none; }
.mh { width: 36px; height: 4px; background: var(--bd2); border-radius: 2px; margin: 0 auto 16px; }
.mt { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 16px; }

/* ── ITEMS (transactions) ─────────────────────────────────── */
.ir { display: flex; align-items: center; gap: 11px; padding: 12px 0; border-bottom: 1px solid var(--bd); position: relative; }
.ir:last-child { border-bottom: none; }
.iic { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; position: relative; }
.ib { flex: 1; min-width: 0; }
.iname { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.isub { font-size: 11px; color: var(--t2); margin-top: 2px; }
.ival { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
.idate { font-size: 10px; color: var(--t3); margin-top: 2px; }
.apos { color: #34D399; }
.aneg { color: var(--a4); }
/* Edit/delete buttons — 36px tap target */
.ea {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 15px;
  border: 1px solid var(--bd2);
  background: var(--s2);
  flex-shrink: 0;
  touch-action: manipulation;
}
.ea:active { transform: scale(.9); }
.ead { border-color: rgba(239,68,68,.3); background: rgba(239,68,68,.08); }

/* ── STATS ────────────────────────────────────────────────── */
.qg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; margin-bottom: 14px; }
.sc { background: var(--s2); border: 1px solid var(--bd); border-radius: var(--rr); padding: 14px; cursor: pointer; }
.slabel { font-size: 10px; color: var(--t3); font-family: 'Syne', sans-serif; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 5px; }
.sval { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }

/* ── SCROLL X ─────────────────────────────────────────────── */
.sx { display: flex; gap: 10px; overflow-x: auto; padding: 0 16px 6px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.sx::-webkit-scrollbar { display: none; }

/* ── MINI CHART ───────────────────────────────────────────── */
.mch { display: flex; align-items: flex-end; gap: 4px; padding: 4px 0 0; height: 88px; }
.mb { flex: 1; border-radius: 4px 4px 0 0; min-height: 4px; }

/* ── TOGGLE ───────────────────────────────────────────────── */
.tog { width: 46px; height: 26px; background: var(--s3); border-radius: 13px; position: relative; cursor: pointer; transition: .25s; border: 1px solid var(--bd2); flex-shrink: 0; touch-action: manipulation; }
.tog.on { background: var(--a1); }
.togT { width: 20px; height: 20px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: .25s; box-shadow: 0 1px 4px rgba(0,0,0,.3); }
.tog.on .togT { left: 22px; }
.sr { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--bd); cursor: pointer; min-height: 52px; }
.sr:last-child { border-bottom: none; }

/* ── ALERTS ───────────────────────────────────────────────── */
.alert { border-radius: var(--r2); padding: 12px 14px; margin-bottom: 10px; display: flex; gap: 10px; align-items: flex-start; }
.alert-r { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25); }
.alert-y { background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.25); }

/* ── PILL GROUP ───────────────────────────────────────────── */
.pg { display: flex; background: var(--s2); border-radius: var(--r3); padding: 3px; gap: 2px; }
.pt { flex: 1; padding: 9px 6px; border-radius: 20px; text-align: center; font-size: 12px; font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer; transition: .15s; color: var(--t2); touch-action: manipulation; min-height: 38px; }
.pt.on { background: var(--s4); color: var(--t1); }

/* ── TYPE TABS ────────────────────────────────────────────── */
.ttabs { display: flex; background: var(--s2); border-radius: var(--r2); padding: 3px; margin-bottom: 14px; gap: 2px; }
.ttab { flex: 1; padding: 10px 4px; border-radius: 8px; text-align: center; font-size: 12px; font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer; transition: .15s; color: var(--t2); touch-action: manipulation; }
.ttab.on.ex { background: var(--r); color: #fff; }
.ttab.on.inc { background: var(--g); color: #fff; }
.ttab.on.tr { background: var(--b); color: #fff; }

/* ── SEARCH ───────────────────────────────────────────────── */
.sbar { margin: 0 16px 12px; position: relative; }
.sbar input {
  width: 100%;
  background: var(--s2);
  border: 1px solid var(--bd2);
  border-radius: var(--r2);
  padding: 12px 13px 12px 40px;
  color: var(--t1);
  font-size: 16px; /* prevents iOS zoom */
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: .15s;
  -webkit-appearance: none;
}
.sbar input:focus { border-color: var(--a1); }
.sbar .si { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--t3); font-size: 16px; }

/* ── ICON PICKER ──────────────────────────────────────────── */
.ipick { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 12px; }
.ipick-item { padding: 10px 4px; border-radius: var(--r2); border: 1px solid var(--bd); text-align: center; font-size: 22px; cursor: pointer; transition: .15s; touch-action: manipulation; }
.ipick-item.sel { border-color: var(--a1); background: rgba(94,234,212,.1); }
.cpick { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.cp-dot { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; transition: .15s; border: 3px solid transparent; touch-action: manipulation; }
.cp-dot.sel { border-color: #fff; transform: scale(1.1); }

/* ── NOTIF PANEL ──────────────────────────────────────────── */
.npanel { position: absolute; inset: 0; background: var(--s1); z-index: 600; overflow-y: auto; transform: translateX(100%); transition: .28s cubic-bezier(.4,0,.2,1); scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.npanel::-webkit-scrollbar { display: none; }
.npanel.open { transform: translateX(0); }

/* ── AI CURSOR ────────────────────────────────────────────── */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.cursor { display: inline-block; width: 2px; height: 13px; background: var(--a1); margin-left: 2px; animation: blink 1s infinite; vertical-align: middle; }
@keyframes spin { to{transform:rotate(360deg)} }
.spin { animation: spin .8s linear infinite; display: inline-block; }

/* ── TOAST ────────────────────────────────────────────────── */
#toast {
  position: absolute;
  /* Ensure toast is above nav bar */
  bottom: calc(var(--nav-h) + 12px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--s2);
  border: 1px solid var(--bd2);
  border-radius: var(--r3);
  padding: 10px 20px;
  font-size: 13px;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  z-index: 999;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
  white-space: nowrap;
}

/* ── HERO ─────────────────────────────────────────────────── */
.hero { padding: 20px 16px 0; background: linear-gradient(180deg, rgba(94,234,212,.06) 0%, transparent 100%); }
.gr { width: 56px; height: 56px; flex-shrink: 0; }

/* ── AUTH / SETUP SCREENS ─────────────────────────────────── */
#scr-loading, #scr-setup, #scr-auth {
  padding-top: var(--sat);
  padding-bottom: var(--sab);
}

.hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">

  <!-- SCREENS -->
  <div id="scr-loading" style="position:absolute;inset:0;background:var(--bg);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
    <div style="font-size:56px">💰</div>
    <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent">FinFlow</div>
    <div id="load-msg" style="font-size:13px;color:var(--t2)">Starting up...</div>
    <div style="width:40px;height:40px;border:3px solid var(--bd2);border-top-color:var(--a1);border-radius:50%" class="spin"></div>
  </div>

  <div id="scr-setup" class="hidden" style="position:absolute;inset:0;background:var(--bg);z-index:1800;overflow-y:auto">
    <div id="setup-body"></div>
  </div>

  <div id="scr-auth" class="hidden" style="position:absolute;inset:0;background:var(--bg);z-index:1600;overflow-y:auto">
    <div id="auth-body"></div>
  </div>

  <!-- PAGES -->
  <div id="page-home"    class="page hidden"></div>
  <div id="page-txn"     class="page hidden"></div>
  <div id="page-budget"  class="page hidden"></div>
  <div id="page-goals"   class="page hidden"></div>
  <div id="page-profile" class="page hidden"></div>

  <!-- NOTIF PANEL -->
  <div class="npanel" id="npanel">
    <div style="display:flex;align-items:center;gap:12px;padding:18px 16px 14px;border-bottom:1px solid var(--bd)">
      <div onclick="closeNotif()" style="width:34px;height:34px;border-radius:10px;background:var(--s2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px">←</div>
      <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;flex:1">Notifications</div>
    </div>
    <div id="notif-list"></div>
  </div>

  <!-- FAB -->
  <div class="fmenu" id="fmenu">

// FIRESTORE CRUD

const {db, doc, setDoc, getDoc, collection, getDocs, updateDoc, deleteDoc, query, where, serverTimestamp, writeBatch} = window.FB || {};

function userCol(col) { return collection(db, 'users', D.uid, col); }
function userDoc(col, id) { return doc(db, 'users', D.uid, col, id); }

async function fsSet(col, id, data) {
  try {
    await setDoc(userDoc(col,id), {...data, updatedAt: serverTimestamp()});
    LS.set(col+'_'+id, data);
  } catch(e) { LS.set(col+'_'+id, data); toast('⚠️ Saved offline','var(--a3)'); }
}

async function fsDel(col, id) {
  try { await deleteDoc(userDoc(col,id)); }
  catch(e) { toast('⚠️ Delete queued','var(--a3)'); }
  LS.set(col+'_'+id, null);
}

async function fsLoadAll() {
  const cols = ['txns','accounts','budgets','loans','investments','goals'];
  try {
    toast('☁️ Loading from Firebase...','var(--a2)');
    const snaps = await Promise.all(cols.map(c => getDocs(userCol(c))));
    cols.forEach((c,i) => {
      const docs = snaps[i].docs.map(d=>({id:d.id,...d.data()}));
      D[c] = docs.length ? docs : DEF[c];
    });
    // Load profile
    const prof = await getDoc(userDoc('profile','main'));
    if(prof.exists()) {
      const p=prof.data();
      D.userName=p.name||D.userName; D.cur=p.currency||D.cur;
      D.income=p.income||D.income; D.cats=p.cats||D.cats;
    }
    toast('✓ Synced with Firebase','#34D399');
    // Seed if new user
    if(!snaps[0].docs.length) await seedUser();
  } catch(e) {
    console.warn('Firebase load failed, using local:', e);
    loadLocal();
    toast('📴 Using local data','var(--a3)');
  }
}

async function seedUser() {
  if(!db||!D.uid) return;
  toast('🌱 Setting up your account...','var(--a2)');
  try {
    const batch = writeBatch(db);
    DEF.txns.forEach(t=>batch.set(userDoc('txns',t.id),t));
    DEF.accounts.forEach(a=>batch.set(userDoc('accounts',a.id),a));
    DEF.budgets.forEach(b=>batch.set(userDoc('budgets',b.id),b));
    DEF.loans.forEach(l=>batch.set(userDoc('loans',l.id),l));
    DEF.investments.forEach(i=>batch.set(userDoc('investments',i.id),i));
    DEF.goals.forEach(g=>batch.set(userDoc('goals',g.id),g));
    await batch.commit();
    D.txns=[...DEF.txns]; D.accounts=[...DEF.accounts]; D.budgets=[...DEF.budgets];
    D.loans=[...DEF.loans]; D.investments=[...DEF.investments]; D.goals=[...DEF.goals];
  } catch(e) { console.warn('Seed failed:', e); }
}

function loadLocal() {
  D.txns=LS.get('txns',DEF.txns); D.accounts=LS.get('accounts',DEF.accounts);
  D.budgets=LS.get('budgets',DEF.budgets); D.loans=LS.get('loans',DEF.loans);
  D.investments=LS.get('investments',DEF.investments); D.goals=LS.get('goals',DEF.goals);
  D.userName=LS.get('name','User'); D.cur=LS.get('cur','₹');
  D.income=LS.get('income',85000); D.cats=LS.get('cats',DEF.cats);
}

function saveLocal() {
  LS.set('txns',D.txns); LS.set('accounts',D.accounts); LS.set('budgets',D.budgets);
  LS.set('loans',D.loans); LS.set('investments',D.investments); LS.set('goals',D.goals);
  LS.set('name',D.userName); LS.set('cur',D.cur); LS.set('income',D.income); LS.set('cats',D.cats);
}

async function boot() {
  const {CONFIGURED, auth, onAuthStateChanged} = window.FB;
  if(!CONFIGURED) { showSetupScreen(); return; }

  // Listen for auth state
  onAuthStateChanged(auth, async user => {
    if(user) {
      D.uid=user.uid; D.userName=user.displayName||'User'; D.email=user.email;
      document.getElementById('load-msg').textContent='Loading your data...';
      await fsLoadAll();
      hideAllScreens();
      showUI();
    } else {
      document.getElementById('scr-loading').classList.add('hidden');
      showAuthScreen('login');
    }
  });
}

function hideAllScreens() {

// ── GOOGLE SIGN-IN ──
async function doGoogleSignIn() {
  const btn = document.getElementById('g-btn');
  if(btn) { btn.textContent='⏳ Signing in with Google...'; btn.disabled=true; }
  try {
    const provider = new window.FB.GoogleAuthProvider();
    provider.addScope('email');
    provider.addScope('profile');
    const result = await window.FB.signInWithPopup(window.FB.auth, provider);
    const user = result.user;
    D.userName = user.displayName || 'User';
    D.email    = user.email || '';
    // onAuthStateChanged handles the rest
  } catch(e) {
    const err = document.getElementById('a-err');
    if(err) {
      if(e.code==='auth/popup-closed-by-user') err.textContent='Sign-in window was closed. Try again.';
      else if(e.code==='auth/popup-blocked') err.textContent='Popup blocked. Allow popups for this site.';
      else err.textContent = e.message||'Google sign-in failed';
    }
    if(btn) { btn.innerHTML=`<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg> Continue with Google`; btn.disabled=false; }
  }
}

// ── EMAIL SIGN-IN ──
async function doLogin() {
  const email=document.getElementById('a-email')?.value?.trim();
  const pass=document.getElementById('a-pass')?.value;
  const err=document.getElementById('a-err');
  const btn=document.getElementById('a-btn');
  if(!email||!pass){err.textContent='Enter email and password';return;}
  btn.textContent='Signing in... ⏳'; btn.disabled=true;
  try {
    await window.FB.signInWithEmailAndPassword(window.FB.auth,email,pass);
    // onAuthStateChanged handles the rest
  } catch(e) {
    const msgs = {
      'auth/invalid-credential':'Wrong email or password',
      'auth/user-not-found':'No account with this email',
      'auth/wrong-password':'Incorrect password',
      'auth/too-many-requests':'Too many attempts. Try again later.',
    };
    err.textContent=msgs[e.code]||e.message;
    btn.textContent='Sign In →'; btn.disabled=false;
  }
}

// ── EMAIL SIGN-UP ──
async function doSignup() {
  const name=document.getElementById('a-name')?.value?.trim()||'User';
  const email=document.getElementById('a-email')?.value?.trim();
  const pass=document.getElementById('a-pass')?.value;
  const cur=document.getElementById('a-cur')?.value||'₹';
  const err=document.getElementById('a-err');
  const btn=document.getElementById('a-btn');
  if(!email||!pass){err.textContent='Enter email and password';return;}
  if(pass.length<6){err.textContent='Password must be at least 6 characters';return;}
  btn.textContent='Creating... ⏳'; btn.disabled=true;
  try {
    const cred=await window.FB.createUserWithEmailAndPassword(window.FB.auth,email,pass);
    await window.FB.updateProfile(cred.user,{displayName:name});
    D.cur=cur; D.userName=name; D.email=email;
    // onAuthStateChanged fires automatically
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use':'An account already exists with this email',
      'auth/invalid-email':'Please enter a valid email address',
      'auth/weak-password':'Password is too weak',
    };
    err.textContent=msgs[e.code]||e.message;
    btn.textContent='Create Account →'; btn.disabled=false;
  }
}

// ── FORGOT PASSWORD ──
async function doReset() {
  const email=document.getElementById('a-email')?.value?.trim();
  if(!email){document.getElementById('a-err').textContent='Enter your email address first';return;}
  try {
    await window.FB.sendPasswordResetEmail(window.FB.auth,email);
    document.getElementById('a-err').style.color='#34D399';
    document.getElementById('a-err').textContent='✓ Reset link sent! Check your inbox.';
  } catch(e) {
    document.getElementById('a-err').textContent=e.code==='auth/user-not-found'?'No account with this email':e.message;
  }
}

// ── SIGN OUT ──
async function doSignOut() {
  await window.FB.signOut(window.FB.auth);
  D.txns=[]; D.accounts=[]; D.budgets=[]; D.loans=[]; D.investments=[]; D.goals=[];
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bnav').classList.add('hidden');
  document.querySelectorAll('.page').forEach(e=>e.classList.add('hidden'));
  showAuthScreen('login');
}

function buildTxnGroups() {
  const q=D.searchQ.toLowerCase();

  filtered.forEach(t=>{(byDate[t.date]=byDate[t.date]||[]).push(t);});
  return Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,txns])=>{
    const dayTotal=txns.filter(t=>t.type==='expense').reduce((a,b)=>a+b.amt,0);

  }).join('')||'<div style="text-align:center;padding:30px;color:var(--t3)">No transactions found</div>';
}

  const alerts=[
    ...D.budgets.filter(b=>b.spent>b.budget).map(b=>`<div class="alert alert-r"><span style="font-size:18px">🚨</span><div><div style="font-size:13px;font-weight:600">${b.cat} exceeded</div><div style="font-size:12px;color:var(--t2)">Over by ${f(b.spent-b.budget)}</div></div></div>`),
    ...D.budgets.filter(b=>b.spent/b.budget>=0.8&&b.spent<=b.budget).map(b=>`<div class="alert alert-y"><span style="font-size:18px">⚠️</span><div><div style="font-size:13px;font-weight:600">${b.cat} at ${pct(b.spent,b.budget)}%</div><div style="font-size:12px;color:var(--t2)">${f(b.budget-b.spent)} remaining</div></div></div>`),
  ].join('');
  el.innerHTML=`
    <div class="ph"><div class="ptitle">Budget</div><div onclick="openM('addBudget')" style="padding:7px 14px;border-radius:var(--r3);background:var(--s2);border:1px solid var(--bd);font-size:13px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600">+ Add</div></div>
    <div class="sec">
      <div class="card" style="margin:0;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:16px">
          <svg width="110" height="110" viewBox="0 0 110 110"><circle cx="55" cy="55" r="${ringR}" fill="none" stroke="var(--s4)" stroke-width="8"/><circle cx="55" cy="55" r="${ringR}" fill="none" stroke="${pColor}" stroke-width="8" stroke-dasharray="${ringDash} ${ringC}" stroke-dashoffset="${ringC/4}" stroke-linecap="round"/><text x="55" y="50" text-anchor="middle" fill="var(--t1)" font-size="18" font-family="Syne,sans-serif" font-weight="800">${p}%</text><text x="55" y="66" text-anchor="middle" fill="var(--t3)" font-size="10" font-family="Syne,sans-serif">used</text></svg>
          <div style="flex:1"><div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800">${f(total)}</div><div style="margin-top:8px;display:flex;flex-direction:column;gap:5px"><div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--t2)">Spent</span><span style="color:var(--a4)">${f(spent)}</span></div><div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--t2)">Remaining</span><span style="color:#34D399">${f(Math.max(total-spent,0))}</span></div></div></div>
        </div>
      </div>

      ${!D.budgets.length?'<div style="text-align:center;padding:30px;color:var(--t3)">No budgets yet</div>':''}

}

function rGoals(el) {
  const tab=D.goalsTab;
  const tabs=['goals','invest','loans','ai'].map(t=>`<div class="pt ${tab===t?'on':''}" onclick="D.goalsTab='${t}';renderP('goals')">${{goals:'Goals',invest:'Invest',loans:'Loans',ai:'AI'}[t]}</div>`).join('');
  let body='';
  if(tab==='goals') {
    body=(D.goals.map(g=>{const p=pct(g.saved,g.target),r=22,circ=2*Math.PI*r,dash=(p/100*circ).toFixed(1),left=g.target-g.saved,mL=Math.max(1,Math.round((new Date(g.gdate+'-01')-new Date())/86400000/30));return`<div class="card2" style="display:flex;gap:12px;align-items:center;margin-bottom:10px"><svg class="gr" viewBox="0 0 58 58"><circle cx="29" cy="29" r="${r}" fill="none" stroke="var(--s4)" stroke-width="5"/><circle cx="29" cy="29" r="${r}" fill="none" stroke="${g.color||'var(--a1)'}" stroke-width="5" stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/><text x="29" y="33" text-anchor="middle" fill="var(--t1)" font-size="11" font-family="Syne,sans-serif" font-weight="700">${p}%</text></svg><div style="flex:1;min-width:0"><div style="font-size:18px;margin-bottom:2px">${g.icon} <span style="font-weight:600;font-size:14px">${g.name}</span></div><div style="font-size:12px;color:var(--t2)">${f(g.saved)} / ${f(g.target)}</div><div style="font-size:11px;color:var(--t3);margin-top:2px">~${f(Math.ceil(left/mL))}/mo · ${g.gdate}</div></div><div style="display:flex;flex-direction:column;gap:6px"><div class="ea" onclick="openM('addGoalFunds','${g.id}')" style="background:rgba(94,234,212,.1);border-color:rgba(94,234,212,.3);color:var(--a1);font-size:12px;width:auto;padding:0 10px">+Add</div><div class="ea" onclick="openM('editGoal','${g.id}')">✏️</div><div class="ea ead" onclick="delConfirm('goal','${g.id}','${g.name}')">🗑</div></div></div>`;}).join(''))||'<div style="text-align:center;padding:24px;color:var(--t3)">No goals yet</div>';
    body+='<button class="btn bts" style="margin-top:4px" onclick="openM(\'addGoal\')">+ Create Goal</button>';
  } else if(tab==='invest') {
    const ti=totalInv(),tc=totalCurr(),tp=pnl();
    const rows=D.investments.map(inv=>{const p2=inv.current-inv.invested,pp=(p2/Math.max(inv.invested,1)*100).toFixed(1);return`<div class="ir"><div class="iic" style="background:var(--s3)">${inv.icon}</div><div class="ib"><div class="iname">${inv.name}</div><div class="isub">${inv.itype}</div></div><div style="display:flex;align-items:center;gap:6px"><div style="text-align:right"><div class="ival">${f(inv.current)}</div><div style="font-size:11px;color:${p2>=0?'#34D399':'var(--a4)'}">${p2>=0?'+':''}${pp}%</div></div><div class="ea" onclick="openM('editInvest','${inv.id}')">✏️</div><div class="ea ead" onclick="delConfirm('invest','${inv.id}','${inv.name}')">🗑</div></div></div>`;}).join('');
    body=`<div class="card2" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:12px"><div><div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Invested</div><div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800">${f(ti)}</div></div><div style="text-align:right"><div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Current</div><div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800">${f(tc)}</div></div></div><div style="padding:10px 14px;background:${tp>=0?'rgba(16,185,129,.08)':'rgba(239,68,68,.08)'};border-radius:var(--r2);border:1px solid ${tp>=0?'rgba(16,185,129,.2)':'rgba(239,68,68,.2)'};margin-bottom:12px"><div style="font-size:11px;color:var(--t3);margin-bottom:3px">P&L</div><div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:${tp>=0?'#34D399':'var(--a4)'}">${tp>=0?'+':''}${f(tp)} <span style="font-size:14px">(${(tp/Math.max(ti,1)*100).toFixed(1)}%)</span></div></div>${rows||'<div style="color:var(--t3);text-align:center;padding:16px">No investments yet</div>'}</div><button class="btn bts" onclick="openM('addInvest')">+ Add Investment</button>`;
  } else if(tab==='loans') {
    body=(D.loans.map(l=>{const p2=pct(l.paid,l.total),rem=l.total-l.paid,mL=Math.ceil(rem/l.emi);return`<div class="card2" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px"><div style="display:flex;gap:10px;align-items:center"><span style="font-size:22px">${l.icon}</span><div><div style="font-weight:600;font-size:15px">${l.name}</div><div style="font-size:11px;color:var(--t2)">${l.rate}% · ${mL}mo left</div></div></div><div style="display:flex;gap:6px"><div class="ea" onclick="openM('editLoan','${l.id}')">✏️</div><div class="ea ead" onclick="delConfirm('loan','${l.id}','${l.name}')">🗑</div></div></div><div class="pw" style="height:7px;margin-bottom:8px"><div class="pb" style="height:7px;width:${p2}%;background:var(--b)"></div></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px"><div class="sc" style="padding:10px"><div class="slabel">EMI</div><div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--a3)">${f(l.emi)}</div></div><div class="sc" style="padding:10px"><div class="slabel">Paid</div><div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#34D399">${f(l.paid)}</div></div><div class="sc" style="padding:10px"><div class="slabel">Left</div><div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--a4)">${f(rem)}</div></div></div><div style="display:flex;gap:8px"><div onclick="openM('loanCalc','${l.id}')" style="flex:1;padding:9px;border-radius:var(--r2);border:1px solid var(--bd2);text-align:center;font-size:12px;cursor:pointer;color:var(--a1);font-family:'Syne',sans-serif;font-weight:600">💡 Payoff Calc</div></div></div>`;}).join(''))||'<div style="text-align:center;padding:24px;color:var(--t3)">No loans yet</div>';
    body+='<button class="btn bts" style="margin-top:4px" onclick="openM(\'addLoan\')">+ Add Loan</button>';
  } else if(tab==='ai') {
    const msgs=D.aiMsgs.map(m=>`<div style="display:flex;gap:10px;margin-bottom:14px;${m.role==='user'?'flex-direction:row-reverse':''}"><${m.role==='assistant'?`div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">🤖</div`:'span'}><div style="max-width:82%;padding:10px 14px;border-radius:${m.role==='user'?'16px 4px 16px 16px':'4px 16px 16px 16px'};background:${m.role==='user'?'var(--b)':'var(--s3)'};font-size:13px;line-height:1.6">${m.text}${m.loading?'<span class="cursor"></span>':''}</div></div>`).join('');
    const prompts=['Analyze my finances','How to save more?','FD vs Mutual Fund?','Pay off loan faster?','Am I on track?'];
    body=`<div style="background:linear-gradient(135deg,rgba(94,234,212,.06),rgba(167,139,250,.06));border:1px solid rgba(94,234,212,.2);border-radius:var(--rr);padding:14px;margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:13px">🤖</div><div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700">AI Finance Advisor</div><span class="badge bt" style="margin-left:auto">Claude AI</span></div><div style="font-size:12px;color:var(--t2)">Powered by your actual Firebase data.</div></div><div id="ai-msgs" style="margin-bottom:12px;max-height:280px;overflow-y:auto">${msgs}</div><div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;margin-bottom:12px">${prompts.map(p=>`<div onclick="sendAI('${p}')" style="padding:8px 13px;border-radius:var(--r3);border:1px solid var(--bd2);font-size:12px;cursor:pointer;white-space:nowrap;color:var(--t2);flex-shrink:0;font-family:'Syne',sans-serif">${p}</div>`).join('')}</div><div style="display:flex;gap:8px"><input id="ai-inp" class="fi" placeholder="Ask anything..." onkeydown="if(event.key==='Enter')sendAI()" style="flex:1"/><button onclick="sendAI()" style="padding:10px 16px;border-radius:var(--r2);background:linear-gradient(135deg,var(--a1),var(--a2));border:none;cursor:pointer;font-size:18px;color:#000;font-weight:700;flex-shrink:0">↑</button></div>`;
  }
  el.innerHTML=`<div class="ph"><div class="ptitle">Goals & Finance</div></div><div style="padding:0 16px;margin-bottom:14px"><div class="pg">${tabs}</div></div><div class="sec">${body}</div>`;
}

function openM(type,id) {
  closeFab();

async function saveTxn(id) {
  const amt=parseFloat(document.getElementById('t-amt')?.value)||0;
  const name=document.getElementById('t-name')?.value||'Transaction';
  const cat=document.getElementById('t-cat')?.value||'Other';
  const acc=document.getElementById('t-acc')?.value||D.accounts[0]?.name;
  const date=document.getElementById('t-date')?.value||today();
  const notes=document.getElementById('t-notes')?.value||'';
  const tags=document.getElementById('t-tags')?.value||'';
  const type=document.getElementById('t-type')?.value||'expense';
  const rec=document.getElementById('rec-tog')?.classList.contains('on')||false;
  const recFreq=document.getElementById('t-freq')?.value||'Monthly';
  const icon=window._TI||_sIcon;
  if(!amt) return alert('Enter an amount');
  const nid = id||tid();
  const row={id:nid,type,cat,name,amt,acc,date,notes,tags,rec,recFreq,icon};
  if(id) { const t=D.txns.find(x=>x.id==id); if(t) Object.assign(t,row); else D.txns.unshift(row); }
  else { D.txns.unshift(row); }
  await fsSet('txns',nid,row);
  saveLocal(); closeM(); renderP(D.page);
}

async function doTransfer() {
  const fi=parseInt(document.getElementById('tf-fi')?.value);
  const ti2=parseInt(document.getElementById('tf-ti')?.value);
  const amt=parseFloat(document.getElementById('tf-amt')?.value)||0;
  const date=document.getElementById('tf-date')?.value||today();
  if(!amt) return alert('Enter amount');
  if(fi===ti2) return alert('Select different accounts');
  const from=D.accounts[fi], to=D.accounts[ti2];
  from.balance-=amt; to.balance+=amt;
  const row={id:tid(),type:'transfer',cat:'Transfer',name:`To ${to.name}`,amt,acc:from.name,date,notes:'',tags:'transfer',rec:false,recFreq:'Monthly',icon:'🔄'};
  D.txns.unshift(row);
  await Promise.all([fsSet('txns',row.id,row),fsSet('accounts',from.id,from),fsSet('accounts',to.id,to)]);
  saveLocal(); closeM(); renderP(D.page);
}

// DELETE
function delConfirm(type,id,name) { openM('confirmDel',{type,id,name}); }
async function doDelete(type,id) {
  const colMap={txn:'txns',acct:'accounts',budget:'budgets',loan:'loans',invest:'investments',goal:'goals'};
  const keyMap={txn:'txns',acct:'accounts',budget:'budgets',loan:'loans',invest:'investments',goal:'goals'};
  D[keyMap[type]]=D[keyMap[type]].filter(x=>x.id!=id);
  if(D.uid) await fsDel(colMap[type],id);
  saveLocal(); closeM(); renderP(D.page);
}

// CALCS
function calcEP(loanId,extra) {
  const l=D.loans.find(x=>x.id==loanId);
  if(!l||!extra||extra<=0) return;
  const rem=l.total-l.paid,mLeft=Math.ceil(rem/l.emi),newMo=Math.ceil(rem/(l.emi+parseFloat(extra)));
  const saved=Math.max(mLeft-newMo,0),intSaved=Math.round(saved*l.emi*l.rate/100/12);
  document.getElementById('ep-res').innerHTML=`<div style="width:100%"><div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--t2)">Current months</span><span>${mLeft}mo</span></div><div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--t2)">New months</span><span style="color:var(--a1)">${newMo}mo</span></div><div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--t2)">Months saved</span><span style="color:#34D399;font-weight:700">${saved}mo</span></div><div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0"><span style="color:var(--t2)">Interest saved</span><span style="color:#34D399;font-weight:700">${f(intSaved)}</span></div></div>`;
}

// AI
async function sendAI(preset) {
  const inp=document.getElementById('ai-inp');
  const q=preset||(inp?inp.value.trim():'');
  if(!q) return;
  if(inp) inp.value='';
  D.aiMsgs.push({role:'user',text:q});
  D.aiMsgs.push({role:'assistant',text:'',loading:true});
  updateAI();
  const ctx=`You are FinFlow AI. User: ${D.userName}. Income: ${f(D.income)}/mo, Expenses: ${f(mExp())}/mo, Net worth: ${f(netWorth())}, Savings: ${mInc()?Math.round((mInc()-mExp())/mInc()*100):0}%, Portfolio P&L: ${f(pnl())} (${(pnl()/Math.max(totalInv(),1)*100).toFixed(1)}%), Overspent: ${D.budgets.filter(b=>b.spent>b.budget).map(b=>b.cat).join(',')||'none'}, Loans: ${D.loans.map(l=>`${l.name} ${f(l.total-l.paid)} remaining`).join('; ')}. Give concise, personalized, actionable advice in 2-4 sentences.`;
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:ctx,messages:D.aiMsgs.filter(m=>!m.loading).map(m=>({role:m.role,content:m.text}))})});
    const data=await res.json();
    D.aiMsgs[D.aiMsgs.length-1]={role:'assistant',text:data.content?.[0]?.text||'No response.',loading:false};
  } catch{ D.aiMsgs[D.aiMsgs.length-1]={role:'assistant',text:'Connection failed. Try again.',loading:false}; }
  updateAI();
}
function updateAI(){const el=document.getElementById('ai-msgs');if(!el)return;el.innerHTML=D.aiMsgs.map(m=>`<div style="display:flex;gap:10px;margin-bottom:14px;${m.role==='user'?'flex-direction:row-reverse':''}"><${m.role==='assistant'?`div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">🤖</div`:'span'}><div style="max-width:82%;padding:10px 14px;border-radius:${m.role==='user'?'16px 4px 16px 16px':'4px 16px 16px 16px'};background:${m.role==='user'?'var(--b)':'var(--s3)'};font-size:13px;line-height:1.6">${m.text}${m.loading?'<span class="cursor"></span>':''}</div></div>`).join('');el.scrollTop=el.scrollHeight;}

function exportCSV(){const rows=[['Date','Type','Category','Name','Amount','Account','Notes','Tags','Recurring']];D.txns.forEach(t=>rows.push([t.date,t.type,t.cat,t.name,t.amt,t.acc,t.notes||'',t.tags||'',t.rec?'Yes':'No']));const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=`finflow_${today()}.csv`;a.click();}

});
